# Same-origin reverse proxy for archery.axlothecook.com. THREE upstreams:
#   /api/*                     -> backend:3100  (the /api prefix is STRIPPED — the
#                                 API mounts at root, e.g. /api/articles -> /articles)
#   dashboard routes + assets  -> dashboard:3000 (admin SvelteKit app; see the regex
#                                 location for the exact paths / bundle / static dirs)
#   everything else /*         -> frontend:3000  (public-site SvelteKit app)
# cloudflared sends traffic here (proxy:80). One origin keeps the session cookie
# first-party (SameSite=Lax), so admin login works on strict browsers.

upstream archery_backend {
    server backend:3100;
}
upstream archery_frontend {
    server frontend:3000;
}
# Admin dashboard — a SECOND SvelteKit app on the same origin. Its client bundle
# lives at /_dash and its static assets at /dash (custom appDir + prefixed static
# dir) so nothing collides with the public frontend's /_app + root assets.
upstream archery_dashboard {
    server dashboard:3000;
}

server {
    listen 80;
    server_name _;

    # Generous body size for admin image uploads (R2-backed).
    client_max_body_size 25m;

    # --- API (same origin, /api prefix stripped) ---------------------------
    location /api/ {
        # trailing slash on proxy_pass strips the /api/ prefix.
        proxy_pass http://archery_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        # forward cookies both ways (session auth for /api/admin/*)
        proxy_pass_request_headers on;
    }

    # --- Admin dashboard (second SvelteKit app, same origin) ---------------
    # Its own top-level route paths + its /_dash bundle + /dash static assets go
    # to the dashboard container; everything else falls through to the public
    # frontend below. The regex covers the routes; the two prefixes cover assets.
    #   routes:  /prijava /nadzorna-ploca /accept-invite /reset-password
    #            /zaboravljena-lozinka /healthz
    #   assets:  /_dash/* (client bundle)   /dash/* (favicon + fonts)
    location ~ ^/(nadzorna-ploca|prijava|accept-invite|reset-password|zaboravljena-lozinka|healthz|_dash|dash)(/|$) {
        proxy_pass http://archery_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        # forward cookies both ways (the session cookie for the /admin guard)
        proxy_pass_request_headers on;
        # SvelteKit streams responses; disable buffering for SSR.
        proxy_buffering off;
    }

    # --- Frontend (SvelteKit node server) ----------------------------------
    location / {
        proxy_pass http://archery_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        # SvelteKit streams responses; disable buffering for SSR.
        proxy_buffering off;
    }
}
