# Same-origin reverse proxy for archery.axlothecook.com.
#   /api/*  -> backend:3100  (the /api prefix is STRIPPED — the API mounts at root,
#             e.g. /api/articles -> backend:3100/articles)
#   /*      -> frontend:3000  (the SvelteKit adapter-node server)
# cloudflared sends traffic here (proxy:80). One origin keeps the session cookie
# first-party (SameSite=Lax), so admin login works on strict browsers.

upstream archery_backend {
    server backend:3100;
}
upstream archery_frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;

    # Generous body size for admin image uploads (R2-backed).
    client_max_body_size 25m;

    # --- API (same origin, /api prefix stripped) ---------------------------
    location /api/ {
        # trailing slash on proxy_pass strips the /api/ prefix.
        proxy_pass http://archery_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        # forward cookies both ways (session auth for /api/admin/*)
        proxy_pass_request_headers on;
    }

    # --- Frontend (SvelteKit node server) ----------------------------------
    location / {
        proxy_pass http://archery_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        # SvelteKit streams responses; disable buffering for SSR.
        proxy_buffering off;
    }
}
