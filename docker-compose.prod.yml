# Archery club (VSK) — PRODUCTION stack on the Raspberry Pi.
# Pulls pre-built arm64 images from GHCR — builds NOTHING on the Pi. CI builds +
# pushes; the Pi only pulls. Self-contained: its OWN Compose network + its OWN
# Cloudflare Tunnel, sharing nothing with the gaming-shop / create-resume stacks
# already on the same Pi.
#
# Run on the Pi from this folder:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# SAME-ORIGIN topology (matches create-resume): the public site is ONE hostname,
# archery.axlothecook.com. The `proxy` (nginx) serves the SvelteKit app at / and
# reverse-proxies /api/* to the backend (stripping /api, since the API mounts at
# root). One origin → first-party SameSite=Lax session cookie (admin login works on
# strict browsers). cloudflared routes the hostname to proxy:80 only.

services:
  # --- PostgreSQL (Prisma 7) -------------------------------------------------
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - archery-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Backend (Express + Prisma, run via tsx) -------------------------------
  backend:
    image: ghcr.io/axlothecook/archery-club-backend:latest
    restart: unless-stopped
    env_file: .env # DATABASE_URL, SESSION_SECRET, CLIENT_ORIGIN, R2_*, GOOGLE_TRANSLATE_KEY, NODE_ENV, PORT
    depends_on:
      db:
        condition: service_healthy

  # --- Frontend (SvelteKit adapter-node server) ------------------------------
  frontend:
    image: ghcr.io/axlothecook/archery-club-frontend:latest
    restart: unless-stopped
    environment:
      # adapter-node trusts X-Forwarded-* from the proxy in front of it.
      - PROTOCOL_HEADER=x-forwarded-proto
      - HOST_HEADER=x-forwarded-host
      # The app reads the API base from $env/dynamic/public at RUNTIME (not build).
      # Must be set here or it falls back to localhost:3100 and SSR loads fetch
      # nothing → empty pages. Same-origin /api (browser + SSR both reach it).
      - PUBLIC_API_BASE_URL=https://archery.axlothecook.com/api
    depends_on:
      - backend

  # --- Admin dashboard (separate SvelteKit adapter-node server) --------------
  # Same-origin with the public site + API (one host, archery.axlothecook.com).
  # nginx routes the dashboard's top-level paths (/prijava, /nadzorna-ploca,
  # /accept-invite, /reset-password, /zaboravljena-lozinka) here; everything else
  # goes to the public `frontend`. Reads PUBLIC_API_BASE_URL at RUNTIME (its
  # auth.ts uses $env/dynamic/public), so it is set here, not baked at build.
  dashboard:
    image: ghcr.io/axlothecook/archery-dashboard:latest
    restart: unless-stopped
    environment:
      - PROTOCOL_HEADER=x-forwarded-proto
      - HOST_HEADER=x-forwarded-host
      - PUBLIC_API_BASE_URL=https://archery.axlothecook.com/api
    depends_on:
      - backend

  # --- Reverse proxy (nginx): same-origin / + /api ---------------------------
  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - dashboard
      - backend
    # No host port published — cloudflared reaches it by service name (proxy:80).

  # --- Cloudflare Tunnel -----------------------------------------------------
  # Outbound-only connection to Cloudflare's edge so archery.axlothecook.com reaches
  # the proxy — no open ports / static IP. Dashboard-managed tunnel: in Zero Trust
  # add ONE public hostname on THIS tunnel:
  #   archery.axlothecook.com -> HTTP -> proxy:80
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - proxy

volumes:
  archery-db:
